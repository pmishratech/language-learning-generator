<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Everyday Conversation Practice</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111f;
        --panel: rgba(10, 18, 33, 0.76);
        --panel-strong: rgba(19, 31, 54, 0.88);
        --panel-soft: rgba(255, 255, 255, 0.045);
        --text: #ecf3ff;
        --muted: #9fb0d1;
        --accent: #7c9cff;
        --accent-2: #5eead4;
        --accent-3: #c084fc;
        --border: rgba(255, 255, 255, 0.1);
        --shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
      }

      html[data-theme="light"] {
        color-scheme: light;
        --bg: #f4f7fb;
        --panel: rgba(255, 255, 255, 0.9);
        --panel-strong: rgba(255, 255, 255, 0.98);
        --panel-soft: rgba(11, 18, 32, 0.04);
        --text: #102033;
        --muted: #5b6f8d;
        --accent: #4f6ef7;
        --accent-2: #0ea5a4;
        --accent-3: #8b5cf6;
        --border: rgba(16, 32, 51, 0.1);
        --shadow: 0 18px 44px rgba(15, 23, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(124, 156, 255, 0.28), transparent 24%),
          radial-gradient(circle at top right, rgba(94, 234, 212, 0.18), transparent 20%),
          radial-gradient(circle at 50% 0%, rgba(192, 132, 252, 0.12), transparent 22%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      body.panel-open {
        overflow: hidden;
      }

      .page {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .hero,
      .toolbar,
      .entry-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero {
        padding: 32px;
        margin-bottom: 20px;
        position: relative;
        overflow: hidden;
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -60px -60px auto;
        width: 220px;
        height: 220px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(124, 156, 255, 0.26), transparent 68%);
        pointer-events: none;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 3rem);
        line-height: 1.05;
      }

      .lead {
        margin: 0;
        color: var(--muted);
        max-width: 75ch;
        font-size: 1rem;
        line-height: 1.65;
      }

      .toolbar {
        padding: 18px;
        display: grid;
        gap: 14px;
        margin-bottom: 0;
        position: fixed;
        right: 20px;
        bottom: 92px;
        width: min(460px, calc(100vw - 32px));
        max-height: calc(100vh - 122px);
        overflow: hidden;
        z-index: 30;
        transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
      }

      .toolbar.collapsed {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateY(16px) scale(0.98);
      }

      .toolbar-body {
        display: grid;
        gap: 14px;
        overflow: auto;
        max-height: inherit;
        padding-right: 4px;
      }

      .panel-toggle {
        width: 58px;
        min-width: 58px;
        min-height: 58px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.25rem;
        line-height: 1;
        position: relative;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        border: 1px solid rgba(255, 255, 255, 0.18);
        box-shadow: 0 18px 38px rgba(79, 110, 247, 0.34);
      }

      .panel-toggle::after {
        content: "";
        position: absolute;
        top: 8px;
        right: 8px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent-2);
        box-shadow: 0 0 0 3px rgba(94, 234, 212, 0.18);
        opacity: 0;
        transition: opacity 120ms ease;
      }

      .panel-toggle.is-collapsed::after {
        opacity: 1;
      }

      .panel-fab {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 40;
      }

      .panel-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(7, 17, 31, 0.52);
        backdrop-filter: blur(8px);
        z-index: 20;
        opacity: 1;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      .panel-backdrop.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .toolbar-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .range-wrap {
        display: grid;
        gap: 8px;
        flex: 1 1 220px;
        min-width: 220px;
      }

      .range-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .range-value {
        color: var(--text);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .status {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 14px;
        border-radius: 999px;
        background: rgba(124, 156, 255, 0.16);
        border: 1px solid rgba(124, 156, 255, 0.35);
        color: var(--text);
        font-weight: 700;
      }

      input[type="search"],
      select,
      input[type="file"] {
        appearance: none;
        border: 1px solid var(--border);
        background: var(--panel-strong);
        color: var(--text);
        border-radius: 12px;
        padding: 12px 14px;
        min-height: 44px;
        font: inherit;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      input[type="search"] {
        flex: 1 1 320px;
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 11px 14px;
        font: inherit;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent), #9f7aea);
        color: white;
        transition: transform 120ms ease, filter 120ms ease;
        box-shadow: 0 10px 22px rgba(124, 156, 255, 0.22);
      }

      button:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid var(--border);
      }

      .results {
        display: grid;
        gap: 18px;
      }

      .entry-card {
        padding: 20px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.025)),
          var(--panel);
        transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
      }

      .entry-card:hover {
        transform: translateY(-2px);
        border-color: rgba(124, 156, 255, 0.28);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
      }

      .entry-card.playing-entry {
        border-color: rgba(94, 234, 212, 0.42);
        box-shadow: 0 24px 72px rgba(18, 181, 163, 0.14), var(--shadow);
      }

      .entry-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .entry-title {
        font-size: 1.08rem;
        font-weight: 700;
      }

      .entry-subtitle {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .line-grid {
        display: grid;
        gap: 12px;
      }

      .line-item {
        display: grid;
        grid-template-columns: 104px minmax(0, 1.15fr) minmax(0, 1.15fr) minmax(250px, 300px);
        gap: 14px;
        align-items: start;
        padding: 14px;
        border-radius: 18px;
        background: var(--panel-soft);
        border: 1px solid rgba(255, 255, 255, 0.07);
      }

      .line-label {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 36px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(94, 234, 212, 0.16);
        border: 1px solid rgba(94, 234, 212, 0.32);
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .line-label.question {
        background: rgba(124, 156, 255, 0.15);
        border-color: rgba(124, 156, 255, 0.28);
      }

      .line-label.answer {
        background: rgba(94, 234, 212, 0.15);
        border-color: rgba(94, 234, 212, 0.28);
      }

      .line-copy {
        display: grid;
        gap: 6px;
      }

      .line-heading {
        color: var(--muted);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .line-text {
        line-height: 1.5;
        white-space: pre-wrap;
        font-size: 1rem;
        padding-top: 4px;
      }

      .line-actions {
        display: flex;
        flex-direction: column;

      .line-item.playing {
        border-color: rgba(94, 234, 212, 0.46);
        background: linear-gradient(135deg, rgba(94, 234, 212, 0.14), rgba(124, 156, 255, 0.12));
        box-shadow: inset 0 0 0 1px rgba(94, 234, 212, 0.14);
      }
        gap: 8px;
        justify-content: flex-start;
      }

      .audio-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 40px;
        padding: 8px 12px;
        border-radius: 12px;
        color: var(--text);
        text-decoration: none;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.14);
        font-size: 0.95rem;
      }

      .audio-link:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      .inline-audio {
        width: 100%;
        min-width: 220px;
        border-radius: 12px;
      }

      .empty {
        padding: 32px;
        text-align: center;
        color: var(--muted);
        border-radius: 20px;
        border: 1px dashed var(--border);
        background: rgba(255, 255, 255, 0.05);
      }

      .note {
        font-size: 0.9rem;
        color: var(--muted);
      }

      .theme-toggle {
        width: 44px;
        min-width: 44px;
        min-height: 44px;
        padding: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.15rem;
        line-height: 1;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 860px) {
        .toolbar {
          left: 12px;
          right: 12px;
          bottom: 86px;
          width: auto;
          max-height: min(72vh, 560px);
        }

        .panel-fab {
          right: 16px;
          bottom: 16px;
        }

        .entry-head {
          flex-direction: column;
          align-items: flex-start;
        }

        .line-item {
          grid-template-columns: 1fr;
        }

        .line-actions {
          justify-content: stretch;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1 id="pageTitle">Everyday Conversation Practice</h1>
        <p id="pageSubtitle" class="lead">
          Build confidence with common questions, useful answers, and matching audio for everyday language practice.
        </p>
      </section>

      <section id="practicePanel" class="toolbar collapsed">
        <div id="toolbarBody" class="toolbar-body">
          <div class="toolbar-row">
            <span class="pill" id="entryCount">Waiting for manifest…</span>
            <span class="status" id="loadStatus">Trying to load local manifest data automatically.</span>
          </div>

          <div class="toolbar-row">
            <label class="hidden" for="searchInput">Search entries</label>
            <input id="searchInput" type="search" aria-label="Search entries" placeholder="Search study text, common questions, answers, names, places, or topics…" />
            <select id="kindFilter" aria-label="Filter by item kind">
              <option value="all">Show questions + answers</option>
              <option value="question">Questions only</option>
              <option value="answer">Answers only</option>
            </select>
            <button id="themeToggle" class="secondary theme-toggle" type="button" aria-label="Switch to light theme" title="Switch to light theme">🌙</button>
            <span id="languageBadge" class="note">Polish ↔ English</span>
            <button id="clearFilters" class="secondary" type="button">Clear filters</button>
          </div>

          <div class="toolbar-row">
            <button id="autoScrollToggle" class="secondary" type="button">Start auto-scroll</button>
            <label class="range-wrap" for="scrollSpeed">
              <span class="range-head">
                <span class="note">Scroll speed</span>
                <span id="scrollSpeedValue" class="range-value">80 px/s</span>
              </span>
              <input id="scrollSpeed" type="range" min="20" max="240" step="10" value="80" aria-label="Auto-scroll speed" />
            </label>
          </div>

          <div class="toolbar-row">
            <button id="playAllToggle" class="secondary" type="button">▶ Play all</button>
            <label class="range-wrap" for="playAllPause">
              <span class="range-head">
                <span class="note">Pause between items</span>
                <span id="playAllPauseValue" class="range-value">1.2 s</span>
              </span>
              <input id="playAllPause" type="range" min="0" max="5000" step="250" value="1200" aria-label="Pause between audio items" />
            </label>
          </div>

        </div>
      </section>

      <section id="results" class="results"></section>

      <div id="emptyState" class="empty hidden">
        No matching entries found. Try a different search or filter.
      </div>
    </main>

    <div id="panelBackdrop" class="panel-backdrop hidden" aria-hidden="true"></div>
    <button id="panelToggle" class="panel-toggle panel-fab" type="button" aria-expanded="false" aria-controls="practicePanel" aria-label="Show practice controls" title="Show practice controls">☰</button>

    <script src="./output-demo-pack/manifest-data.js"></script>
    <script>
      const manifestUrl = './output-demo-pack/manifest.json';
      const embeddedBundle = window.__LANGUAGE_LEARNING_BUNDLE__ || null;
      const embeddedManifest = window.__POLISH_MANIFEST__ || [];
      const resultsEl = document.getElementById('results');
      const emptyStateEl = document.getElementById('emptyState');
      const searchInput = document.getElementById('searchInput');
      const kindFilter = document.getElementById('kindFilter');
      const clearFiltersBtn = document.getElementById('clearFilters');
      const entryCountEl = document.getElementById('entryCount');
      const loadStatusEl = document.getElementById('loadStatus');
      const pageTitleEl = document.getElementById('pageTitle');
      const pageSubtitleEl = document.getElementById('pageSubtitle');
      const toolbarEl = document.querySelector('.toolbar');
      const panelBackdropEl = document.getElementById('panelBackdrop');
      const panelToggleEl = document.getElementById('panelToggle');
      const themeToggleEl = document.getElementById('themeToggle');
      const autoScrollToggleEl = document.getElementById('autoScrollToggle');
      const scrollSpeedInputEl = document.getElementById('scrollSpeed');
      const scrollSpeedValueEl = document.getElementById('scrollSpeedValue');
      const playAllToggleEl = document.getElementById('playAllToggle');
      const playAllPauseInputEl = document.getElementById('playAllPause');
      const playAllPauseValueEl = document.getElementById('playAllPauseValue');
      const languageBadgeEl = document.getElementById('languageBadge');

      const THEME_STORAGE_KEY = 'language-learning-theme';
      const PANEL_STORAGE_KEY = 'language-learning-toolbar-collapsed';
      const SCROLL_SPEED_STORAGE_KEY = 'language-learning-scroll-speed';
      const PLAY_ALL_PAUSE_STORAGE_KEY = 'language-learning-play-all-pause';

      let rawItems = [];
      let groupedEntries = [];
      let autoScrollActive = false;
      let autoScrollFrame = null;
      let autoScrollLastTimestamp = 0;
      let autoScrollSpeed = 80;
      let playAllActive = false;
      let playAllPauseMs = 1200;
      let playAllQueue = [];
      let playAllIndex = 0;
      let playAllTimeout = null;
      let playAllScrollFrame = null;
      const playAllAudio = new Audio();

      function detectInitialTheme() {
        const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
        if (savedTheme === 'light' || savedTheme === 'dark') {
          return savedTheme;
        }
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const nextTheme = theme === 'dark' ? 'light' : 'dark';
        const icon = theme === 'dark' ? '🌙' : '☀️';
        const label = `Switch to ${nextTheme} theme`;
        themeToggleEl.textContent = icon;
        themeToggleEl.setAttribute('aria-label', label);
        themeToggleEl.setAttribute('title', label);
        localStorage.setItem(THEME_STORAGE_KEY, theme);
      }

      function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme') || detectInitialTheme();
        applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
      }

      function applyToolbarCollapsed(collapsed) {
        toolbarEl.classList.toggle('collapsed', collapsed);
        panelBackdropEl.classList.toggle('hidden', collapsed);
        document.body.classList.toggle('panel-open', !collapsed);
        panelToggleEl.setAttribute('aria-expanded', String(!collapsed));
        panelToggleEl.textContent = collapsed ? '☰' : '✕';
        panelToggleEl.classList.toggle('is-collapsed', collapsed);
        const label = collapsed ? 'Show practice controls' : 'Hide practice controls';
        panelToggleEl.setAttribute('aria-label', label);
        panelToggleEl.setAttribute('title', label);
        localStorage.setItem(PANEL_STORAGE_KEY, collapsed ? 'true' : 'false');
      }

      function detectInitialPanelState() {
        return localStorage.getItem(PANEL_STORAGE_KEY) !== 'false';
      }

      function toggleToolbarCollapsed() {
        applyToolbarCollapsed(!toolbarEl.classList.contains('collapsed'));
      }

      function clampScrollSpeed(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
          return 80;
        }
        return Math.min(240, Math.max(20, Math.round(numeric / 10) * 10));
      }

      function detectInitialScrollSpeed() {
        return clampScrollSpeed(localStorage.getItem(SCROLL_SPEED_STORAGE_KEY) || 80);
      }

      function clampPlayAllPause(value) {
        const numeric = Number(value);
        if (!Number.isFinite(numeric)) {
          return 1200;
        }
        return Math.min(5000, Math.max(0, Math.round(numeric / 250) * 250));
      }

      function detectInitialPlayAllPause() {
        return clampPlayAllPause(localStorage.getItem(PLAY_ALL_PAUSE_STORAGE_KEY) || 1200);
      }

      function updateScrollSpeedUi() {
        scrollSpeedInputEl.value = String(autoScrollSpeed);
        scrollSpeedValueEl.textContent = `${autoScrollSpeed} px/s`;
      }

      function updatePlayAllPauseUi() {
        playAllPauseInputEl.value = String(playAllPauseMs);
        playAllPauseValueEl.textContent = `${(playAllPauseMs / 1000).toFixed(playAllPauseMs % 1000 === 0 ? 0 : 1)} s`;
      }

      function getItemKey(item) {
        return [item.entry_index ?? '', item.kind ?? '', item.ordinal ?? '', item.output_file ?? ''].join('|');
      }

      function clearPlayingHighlights() {
        document.querySelectorAll('.line-item.playing').forEach((element) => element.classList.remove('playing'));
        document.querySelectorAll('.entry-card.playing-entry').forEach((element) => element.classList.remove('playing-entry'));
      }

      function getItemRow(item) {
        const itemKey = getItemKey(item);
        return Array.from(resultsEl.querySelectorAll('.line-item')).find((element) => element.dataset.itemKey === itemKey) || null;
      }

      function getScrollTargetForItem(item) {
        const row = getItemRow(item);
        if (!row) {
          return null;
        }
        const topOffset = Math.max(96, Math.min(window.innerHeight * 0.18, 160));
        return Math.max(0, row.getBoundingClientRect().top + window.scrollY - topOffset);
      }

      function stopPlayAllScrollSync(clearHighlight = false) {
        if (playAllScrollFrame !== null) {
          cancelAnimationFrame(playAllScrollFrame);
          playAllScrollFrame = null;
        }
        if (clearHighlight) {
          clearPlayingHighlights();
        }
      }

      function setPlayAllScrollSyncEnabled(enabled) {
        autoScrollToggleEl.disabled = enabled;
        scrollSpeedInputEl.disabled = enabled;
        if (enabled) {
          autoScrollToggleEl.textContent = 'Audio sync on';
          scrollSpeedValueEl.textContent = 'Synced';
        } else {
          autoScrollToggleEl.disabled = false;
          scrollSpeedInputEl.disabled = false;
          updateScrollSpeedUi();
          autoScrollToggleEl.textContent = autoScrollActive ? 'Stop auto-scroll' : 'Start auto-scroll';
        }
      }

      function syncScrollToPlaybackItem(item, durationSeconds = Number.NaN) {
        stopPlayAllScrollSync();
        clearPlayingHighlights();

        const row = getItemRow(item);
        if (row) {
          row.classList.add('playing');
          const card = row.closest('.entry-card');
          if (card) {
            card.classList.add('playing-entry');
          }
        }

        const currentTarget = getScrollTargetForItem(item);
        if (currentTarget === null) {
          return;
        }

        window.scrollTo({ top: currentTarget });

        const nextItem = playAllQueue[playAllIndex + 1];
        if (!nextItem || !Number.isFinite(durationSeconds) || durationSeconds <= 0) {
          return;
        }

        const nextTarget = getScrollTargetForItem(nextItem);
        if (nextTarget === null || Math.abs(nextTarget - currentTarget) < 4) {
          return;
        }

        const totalMs = durationSeconds * 1000 + playAllPauseMs;
        const startTime = performance.now();

        const step = (timestamp) => {
          if (!playAllActive || playAllQueue[playAllIndex] !== item) {
            playAllScrollFrame = null;
            return;
          }
          const progress = Math.min(1, (timestamp - startTime) / totalMs);
          const targetY = currentTarget + (nextTarget - currentTarget) * progress;
          window.scrollTo({ top: targetY });
          if (progress < 1) {
            playAllScrollFrame = requestAnimationFrame(step);
          } else {
            playAllScrollFrame = null;
          }
        };

        playAllScrollFrame = requestAnimationFrame(step);
      }

      function stopAutoScroll() {
        autoScrollActive = false;
        autoScrollLastTimestamp = 0;
        if (autoScrollFrame !== null) {
          cancelAnimationFrame(autoScrollFrame);
          autoScrollFrame = null;
        }
        autoScrollToggleEl.textContent = 'Start auto-scroll';
        autoScrollToggleEl.classList.remove('active');
      }

      function runAutoScroll(timestamp) {
        if (!autoScrollActive) {
          return;
        }

        if (!autoScrollLastTimestamp) {
          autoScrollLastTimestamp = timestamp;
        }

        const elapsedSeconds = (timestamp - autoScrollLastTimestamp) / 1000;
        autoScrollLastTimestamp = timestamp;
        const maxScrollTop = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);

        if (window.scrollY >= maxScrollTop - 2) {
          window.scrollTo({ top: maxScrollTop });
          stopAutoScroll();
          return;
        }

        const nextScrollTop = Math.min(maxScrollTop, window.scrollY + autoScrollSpeed * elapsedSeconds);
        window.scrollTo({ top: nextScrollTop });
        autoScrollFrame = requestAnimationFrame(runAutoScroll);
      }

      function startAutoScroll() {
        const maxScrollTop = Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
        if (window.scrollY >= maxScrollTop - 2) {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        autoScrollActive = true;
        autoScrollLastTimestamp = 0;
        autoScrollToggleEl.textContent = 'Stop auto-scroll';
        autoScrollToggleEl.classList.add('active');
        autoScrollFrame = requestAnimationFrame(runAutoScroll);
      }

      function toggleAutoScroll() {
        if (autoScrollActive) {
          stopAutoScroll();
        } else {
          startAutoScroll();
        }
      }

      function getFilteredEntries() {
        const searchTerm = normalize(searchInput.value.trim());
        const filterKind = kindFilter.value;

        return groupedEntries
          .map((entry) => {
            const lines = entry.lines.filter((line) => {
              if (filterKind !== 'all' && line.kind !== filterKind) {
                return false;
              }

              if (!searchTerm) {
                return true;
              }

              const haystack = normalize([
                line.display_text,
                line.translation_text,
                line.text,
                line.original_text,
                line.source_question,
                line.source_answer,
                line.kind,
                entry.entryIndex,
              ].join(' '));

              return haystack.includes(searchTerm);
            });

            return {
              ...entry,
              lines,
            };
          })
          .filter((entry) => entry.lines.length > 0);
      }

      function getPlayAllItems() {
        return getFilteredEntries().flatMap((entry) => entry.lines);
      }

      function stopPlayAll(resetAudio = true) {
        playAllActive = false;
        playAllQueue = [];
        playAllIndex = 0;
        stopPlayAllScrollSync(true);
        setPlayAllScrollSyncEnabled(false);
        if (playAllTimeout !== null) {
          clearTimeout(playAllTimeout);
          playAllTimeout = null;
        }
        if (resetAudio) {
          playAllAudio.pause();
          playAllAudio.removeAttribute('src');
          playAllAudio.load();
        }
        playAllToggleEl.textContent = '▶ Play all';
        playAllToggleEl.classList.remove('active');
      }

      async function playCurrentQueueItem() {
        if (!playAllActive) {
          return;
        }

        const item = playAllQueue[playAllIndex];
        if (!item) {
          stopPlayAll();
          return;
        }

        syncScrollToPlaybackItem(item);
        playAllAudio.src = item.output_file;
        try {
          await playAllAudio.play();
        } catch (error) {
          setStatus('Playback could not start automatically. Tap Play all again to continue.', 'Playback blocked');
          stopPlayAll(false);
        }
      }

      function startPlayAll() {
        const items = getPlayAllItems();
        if (!items.length) {
          setStatus('No matching audio items are available for Play all.', 'Nothing to play');
          stopPlayAll();
          return;
        }

        stopAutoScroll();
        playAllActive = true;
        playAllQueue = items;
        playAllIndex = 0;
        setPlayAllScrollSyncEnabled(true);
        playAllToggleEl.textContent = '■ Stop playback';
        playAllToggleEl.classList.add('active');
        playCurrentQueueItem();
      }

      function togglePlayAll() {
        if (playAllActive) {
          stopPlayAll();
        } else {
          startPlayAll();
        }
      }

      function applyMeta(meta) {
        const title = meta?.dashboard_title || 'Everyday Conversation Practice';
        const subtitle = meta?.dashboard_subtitle || 'Build confidence with common questions, useful answers, and matching audio for everyday language practice.';
        const studyLanguage = meta?.study_language_name || 'Polish';
        const referenceLanguage = meta?.reference_language_name || 'English';
        pageTitleEl.textContent = title;
        pageSubtitleEl.textContent = subtitle;
        languageBadgeEl.textContent = `${studyLanguage} ↔ ${referenceLanguage}`;
        document.title = title;
      }

      function normalizePayload(payload) {
        if (payload && Array.isArray(payload.items)) {
          return {
            meta: payload.meta || {},
            items: payload.items.map((item) => ({
              ...item,
              display_text: item.display_text || item.text || '',
              translation_text: item.translation_text || '',
              output_file: item.output_file_from_repo_root || item.output_file || '',
            })),
          };
        }

        if (Array.isArray(payload)) {
          return {
            meta: {},
            items: payload.map((item) => ({
              ...item,
              display_text: item.display_text || item.text || '',
              translation_text: item.translation_text || item.original_reference_text || '',
              output_file: item.output_file || '',
            })),
          };
        }

        return {
          meta: {},
          items: [],
        };
      }

      function normalize(value) {
        return (value || '')
          .toString()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase();
      }

      function groupManifest(items) {
        const grouped = new Map();

        for (const item of items) {
          if (!grouped.has(item.entry_index)) {
            grouped.set(item.entry_index, {
              entryIndex: item.entry_index,
              question: item.source_question || '',
              answer: item.source_answer || '',
              lines: [],
            });
          }

          grouped.get(item.entry_index).lines.push(item);
        }

        return Array.from(grouped.values()).sort((a, b) => a.entryIndex - b.entryIndex);
      }

      function setStatus(message, countMessage = null) {
        loadStatusEl.textContent = message;
        if (countMessage) {
          entryCountEl.textContent = countMessage;
        }
      }

      function render() {
        const filteredEntries = getFilteredEntries();

        resultsEl.innerHTML = '';

        if (!filteredEntries.length) {
          emptyStateEl.classList.remove('hidden');
          return;
        }

        emptyStateEl.classList.add('hidden');

        for (const entry of filteredEntries) {
          const card = document.createElement('article');
          card.className = 'entry-card';

          const head = document.createElement('div');
          head.className = 'entry-head';
          head.innerHTML = `
            <div>
              <div class="entry-title">Entry ${entry.entryIndex}</div>
              <div class="entry-subtitle">Question + answer pair</div>
            </div>
            <div class="entry-subtitle">${entry.lines.length} audio item${entry.lines.length === 1 ? '' : 's'}</div>
          `;
          card.appendChild(head);

          const lineGrid = document.createElement('div');
          lineGrid.className = 'line-grid';

          for (const line of entry.lines) {
            const row = document.createElement('div');
            row.className = 'line-item';
            row.dataset.itemKey = getItemKey(line);

            const label = document.createElement('div');
            label.className = `line-label ${line.kind}`;
            label.textContent = line.kind === 'question' ? 'Question' : 'Answer';

            const study = document.createElement('div');
            study.className = 'line-copy';
            study.innerHTML = '<div class="line-heading">Polish</div><div class="line-text"></div>';
            study.querySelector('.line-text').textContent = line.display_text || line.text || '';

            const translation = document.createElement('div');
            translation.className = 'line-copy';
            translation.innerHTML = '<div class="line-heading">English</div><div class="line-text"></div>';
            translation.querySelector('.line-text').textContent = line.translation_text || '—';

            const actions = document.createElement('div');
            actions.className = 'line-actions';

            const audio = document.createElement('audio');
            audio.className = 'inline-audio';
            audio.controls = true;
            audio.preload = 'none';
            audio.src = line.output_file;

            actions.appendChild(audio);
            row.append(label, study, translation, actions);
            lineGrid.appendChild(row);
          }

          card.appendChild(lineGrid);
          resultsEl.appendChild(card);
        }
      }

      function loadManifest(payload) {
        stopPlayAll();
        const normalized = normalizePayload(payload);
        applyMeta(normalized.meta);
        rawItems = normalized.items;
        groupedEntries = groupManifest(rawItems);
        setStatus(
          'Manifest loaded. You can search, filter, and play any line.',
          `${groupedEntries.length} entries · ${rawItems.length} audio items`
        );
        render();
      }

      async function autoLoadManifest() {
        if (embeddedBundle || embeddedManifest.length) {
          loadManifest(embeddedBundle || embeddedManifest);
          setStatus(
            embeddedBundle
              ? 'Loaded local manifest bundle directly from manifest-data.js.'
              : 'Loaded local manifest data directly from manifest-data.js.',
            `${groupedEntries.length} entries · ${rawItems.length} audio items`
          );
          return;
        }

        try {
          const response = await fetch(manifestUrl);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const payload = await response.json();
          loadManifest(payload);
        } catch (error) {
          setStatus(
            'Automatic loading was blocked or failed. Open this folder through a small local web server or use the packaged demo page with embedded manifest data.',
            'Manifest not auto-loaded'
          );
        }
      }

      searchInput.addEventListener('input', () => {
        stopPlayAll();
        render();
      });
      kindFilter.addEventListener('change', () => {
        stopPlayAll();
        render();
      });
      clearFiltersBtn.addEventListener('click', () => {
        stopPlayAll();
        searchInput.value = '';
        kindFilter.value = 'all';
        render();
      });
      panelToggleEl.addEventListener('click', toggleToolbarCollapsed);
      panelBackdropEl.addEventListener('click', () => applyToolbarCollapsed(true));
      themeToggleEl.addEventListener('click', toggleTheme);
      autoScrollToggleEl.addEventListener('click', toggleAutoScroll);
      scrollSpeedInputEl.addEventListener('input', () => {
        autoScrollSpeed = clampScrollSpeed(scrollSpeedInputEl.value);
        localStorage.setItem(SCROLL_SPEED_STORAGE_KEY, String(autoScrollSpeed));
        updateScrollSpeedUi();
      });
      playAllToggleEl.addEventListener('click', togglePlayAll);
      playAllPauseInputEl.addEventListener('input', () => {
        playAllPauseMs = clampPlayAllPause(playAllPauseInputEl.value);
        localStorage.setItem(PLAY_ALL_PAUSE_STORAGE_KEY, String(playAllPauseMs));
        updatePlayAllPauseUi();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !toolbarEl.classList.contains('collapsed')) {
          applyToolbarCollapsed(true);
        }
      });
      window.addEventListener('wheel', () => {
        if (autoScrollActive) {
          stopAutoScroll();
        }
        if (playAllActive) {
          stopPlayAllScrollSync();
        }
      }, { passive: true });
      window.addEventListener('touchstart', () => {
        if (autoScrollActive) {
          stopAutoScroll();
        }
        if (playAllActive) {
          stopPlayAllScrollSync();
        }
      }, { passive: true });
      playAllAudio.addEventListener('loadedmetadata', () => {
        if (!playAllActive) {
          return;
        }
        const currentItem = playAllQueue[playAllIndex];
        if (currentItem) {
          syncScrollToPlaybackItem(currentItem, playAllAudio.duration);
        }
      });
      playAllAudio.addEventListener('ended', () => {
        if (!playAllActive) {
          return;
        }
        if (playAllIndex >= playAllQueue.length - 1) {
          stopPlayAll(false);
          return;
        }
        playAllTimeout = window.setTimeout(() => {
          playAllIndex += 1;
          playCurrentQueueItem();
        }, playAllPauseMs);
      });
      playAllAudio.addEventListener('error', () => {
        if (!playAllActive) {
          return;
        }
        if (playAllIndex >= playAllQueue.length - 1) {
          stopPlayAll(false);
          return;
        }
        playAllTimeout = window.setTimeout(() => {
          playAllIndex += 1;
          playCurrentQueueItem();
        }, playAllPauseMs);
      });

      applyTheme(detectInitialTheme());
      autoScrollSpeed = detectInitialScrollSpeed();
      updateScrollSpeedUi();
      playAllPauseMs = detectInitialPlayAllPause();
      updatePlayAllPauseUi();
      setPlayAllScrollSyncEnabled(false);
      stopPlayAll();
      stopAutoScroll();
      applyToolbarCollapsed(detectInitialPanelState());
      autoLoadManifest();
    </script>
  </body>
</html>
